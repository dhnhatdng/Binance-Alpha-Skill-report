# term_translation.yaml — v0.6.0-beta.6 大白话翻译表 (REFERENCE-ONLY)
#
# !! IMPORTANT — NOT LOADED AT RUNTIME !!
# Codex beta.6 9th-audit MED 4 caught the previous version of this comment
# claiming render_report.py "selects zh/en via dominant-language ratio" —
# untrue, no code path loads this file. Demoted to non-runtime reference
# documentation in beta.7.
#
# The actual translations are HARDCODED in:
#   - section_l_distribution._ROLE_LABELS (role enum → 中文 label)
#   - forensic_pipeline._build_monitoring_wallets (per-wallet role string)
#   - forensic_pipeline detector_summary[].label
#   - validator._TIER_CN_LABELS (verdict enum → 中文)
#
# This file serves two purposes:
#   1. A single canonical source for what jargon → 大白话 should look like
#      across the codebase. If you change a label here, update the
#      hardcoded copy + grep to verify consistency.
#   2. EN translation reference for future v0.7 bilingual emit (if needed).
#
# v0.4.8 时代曾经有"大白话化"重写, v0.6 重写时丢了, beta.6 重新加回 (hardcoded
# 各文件而不是动态 load — 简单 + 不引入 yaml dependency)。

version: "0.6.0-beta.6"
updated: "2026-05-24"


